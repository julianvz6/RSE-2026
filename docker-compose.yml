services:
  grobid:
    image: lfoppiano/grobid:0.8.1
    container_name: grobidC_server
    ports:
      - "8070:8070"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8070'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    
  pipeline:
    build: .
    depends_on:
      grobid:
        condition: service_healthy
    volumes:
      - ./prac_output:/app/prac_output
      - ./grobid_output:/app/grobid_output
    environment:
      - GROBID_SERVER=http://grobid:8070
